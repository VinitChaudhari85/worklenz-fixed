services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:15.10-alpine
    container_name: worklenz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-worklenz_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init-wrapper.sh:/docker-entrypoint-initdb.d/00-init-wrapper.sh:ro
      - ./worklenz-backend/database:/database:ro
      - ./backups:/pg_backups
    networks:
      - worklenz-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-worklenz_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ============================================================
  # Database Backup Service (opt-in via --profile backup)
  # ============================================================
  db-backup:
    image: postgres:15.10-alpine
    container_name: worklenz-db-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${DB_NAME:-worklenz_db}
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
    networks:
      - worklenz-backend
    entrypoint: /bin/sh
    command: >
      -c "
      while true; do
        echo 'Running database backup...';
        BACKUP_FILE=\"/backups/worklenz_backup_$$(date +%Y%m%d_%H%M%S).sql\";
        pg_dump > \"$$BACKUP_FILE\" 2>&1;
        if [ $$? -eq 0 ]; then
          echo \"Backup completed: $$BACKUP_FILE\";
          gzip \"$$BACKUP_FILE\";
          find /backups -name 'worklenz_backup_*.sql.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete;
          echo 'Cleanup done';
        else
          echo 'ERROR: Backup failed';
          rm -f \"$$BACKUP_FILE\";
        fi;
        echo 'Next backup in 24 hours...';
        sleep 86400;
      done
      "
    profiles:
      - backup

  # ============================================================
  # Redis Cache
  # NOTE: No profile — always starts with the stack
  # ============================================================
  redis:
    image: redis:7.4-alpine
    container_name: worklenz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks:
      - worklenz-backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-worklenz_redis_pass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  # ============================================================
  # MinIO Object Storage
  # FIX: Switched from docker.io/minio/minio (dead registry)
  #      to quay.io/minio/minio (official, actively updated)
  # NOTE: No profile — always starts with the stack
  # ============================================================
  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: worklenz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      MINIO_BROWSER: ${MINIO_BROWSER:-on}
    volumes:
      - minio_data:/data
    networks:
      - worklenz-backend
      - worklenz-frontend
    healthcheck:
      # FIX: Use mc ready (more reliable than curl on /minio/health/live)
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # ============================================================
  # MinIO Init — Creates the initial bucket
  # FIX: Switched to quay.io/minio/mc (matches minio image source)
  # FIX: Replaced fragile "sleep 5" with a proper retry loop
  # FIX: Added depends_on minio healthy so it never races
  # NOTE: No profile — always starts with the stack
  # ============================================================
  minio-init:
    image: quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: worklenz-minio-init
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${AWS_BUCKET:-worklenz-bucket}
    networks:
      - worklenz-backend
      - worklenz-frontend
    entrypoint: >
      /bin/sh -c "
      echo '[minio-init] Configuring MinIO client alias...';
      until /usr/bin/mc alias set worklenz http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo '[minio-init] MinIO not ready yet, retrying in 3s...';
        sleep 3;
      done;
      echo '[minio-init] Creating bucket: '$${MINIO_BUCKET};
      /usr/bin/mc mb worklenz/$${MINIO_BUCKET} --ignore-existing;
      echo '[minio-init] Setting anonymous download policy...';
      /usr/bin/mc anonymous set download worklenz/$${MINIO_BUCKET};
      echo '[minio-init] Done. Bucket ready.';
      exit 0;
      "

  # ============================================================
  # Backend API
  # FIX: Now waits for both postgres AND minio-init to complete
  #      so the bucket always exists before the backend starts
  # ============================================================
  backend:
    image: chamikajaycey/worklenz-backend:${BACKEND_VERSION:-2.1.6}
    build:
      context: ./worklenz-backend
      dockerfile: Dockerfile
    container_name: worklenz-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      # Server
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      COOKIE_SECRET: ${COOKIE_SECRET:?COOKIE_SECRET is required}
      SESSION_NAME: ${SESSION_NAME:-worklenz.sid}

      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-worklenz_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_MAX_CLIENTS: ${DB_MAX_CLIENTS:-50}
      USE_PG_NATIVE: ${USE_PG_NATIVE:-false}

      # CORS
      SERVER_CORS: ${SERVER_CORS:-*}
      SOCKET_IO_CORS: ${SOCKET_IO_CORS}
      FRONTEND_URL: ${FRONTEND_URL}

      # Storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-s3}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}

      # S3 / MinIO
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-worklenz-bucket}
      S3_BUCKET: ${S3_BUCKET:-worklenz-bucket}
      S3_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # IMPORTANT: S3_URL must point to minio (container name) for backend-to-minio
      # communication inside Docker, NOT to localhost
      S3_URL: ${S3_URL:-http://minio:9000}
      # S3_PUBLIC_URL is the URL browsers use to access files.
      # For production, set this to http://YOUR_SERVER_IP:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-${S3_URL:-http://minio:9000}}

      # Azure (optional, leave blank)
      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME:-}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY:-}
      AZURE_STORAGE_URL: ${AZURE_STORAGE_URL:-}

      # Google OAuth (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}

      # Email (SMTP)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Worklenz <noreply@worklenz.com>}
      ENABLE_EMAIL_CRONJOBS: ${ENABLE_EMAIL_CRONJOBS:-false}
      CONTACT_US_EMAIL: ${CONTACT_US_EMAIL:-}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}

      # reCAPTCHA (optional)
      GOOGLE_CAPTCHA_SECRET_KEY: ${GOOGLE_CAPTCHA_SECRET_KEY:-}
      GOOGLE_CAPTCHA_PASS_SCORE: ${GOOGLE_CAPTCHA_PASS_SCORE:-0.8}

      # Timezone
      TZ: ${TZ:-UTC}

    volumes:
      - backend_logs:/app/logs
    networks:
      - worklenz-backend
      - worklenz-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/public/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    security_opt:
      - no-new-privileges:true

  # ============================================================
  # Frontend Application
  # ============================================================
  frontend:
    image: chamikajaycey/worklenz-frontend:${FRONTEND_VERSION:-2.1.6}
    build:
      context: ./worklenz-frontend
      dockerfile: Dockerfile
    container_name: worklenz-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Worklenz}
      VITE_APP_ENV: production
      VITE_ENABLE_RECAPTCHA: ${VITE_ENABLE_RECAPTCHA:-false}
      VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-}
      VITE_ENABLE_GOOGLE_LOGIN: ${VITE_ENABLE_GOOGLE_LOGIN:-false}
      VITE_ENABLE_SURVEY_MODAL: ${VITE_ENABLE_SURVEY_MODAL:-false}
    networks:
      - worklenz-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: worklenz-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    networks:
      - worklenz-frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # ============================================================
  # Certbot — Let's Encrypt SSL (opt-in via --profile ssl)
  # ============================================================
  certbot:
    image: certbot/certbot:v3.1.0
    container_name: worklenz-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl

# ============================================================
# Networks
# worklenz-backend: internal only (postgres, redis, minio, backend)
# worklenz-frontend: external facing (nginx, frontend, backend)
# ============================================================
networks:
  worklenz-backend:
    driver: bridge
    internal: true
  worklenz-frontend:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local
